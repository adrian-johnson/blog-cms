<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Blog CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container-fluid" style="display: flex; justify-content: space-between; align-items: center;">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-feather-alt"></i> Blog CMS
            </a>
            <div class="d-flex" style="align-items: center; gap: 20px;">
                <a href="index.html" class="nav-link">Dashboard</a>
                <div style="position: relative; display: inline-block;">
                    <a href="#" class="nav-link" style="cursor: pointer; color: #0a66c2;" onclick="event.preventDefault(); document.getElementById('contentMenu').style.display = document.getElementById('contentMenu').style.display === 'block' ? 'none' : 'block';">Content <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 4px;"></i></a>
                    <div id="contentMenu" class="dropdown-menu" style="display: none; position: absolute; top: 100%; left: 0; min-width: 150px;">
                        <a href="#" class="dropdown-item">Posts</a>
                        <a href="#" class="dropdown-item">Pages</a>
                        <a href="#" class="dropdown-item">Projects</a>
                    </div>
                </div>
                <a href="settings.html" class="nav-link">Settings</a>
                <a href="#" class="nav-link">Users</a>
                <div style="position: relative; display: inline-block; margin-left: 20px;">
                    <button class="btn btn-outline-primary" style="font-size: 0.9rem; padding: 8px 14px;" onclick="document.getElementById('userMenu').style.display = document.getElementById('userMenu').style.display === 'block' ? 'none' : 'block';">
                        <i class="fas fa-user"></i> adrian-johnson <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 6px;"></i>
                    </button>
                    <div id="userMenu" class="dropdown-menu" style="display: none; position: absolute; top: 100%; right: 0; min-width: 150px;">
                        <a href="profile.html" class="dropdown-item"><i class="fas fa-user-circle"></i> Profile</a>
                        <div class="dropdown-divider"></div>
                        <a href="login.html" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Edit Post</h1>

            <form>
                <div class="row">
                    <!-- Left Column - Editor -->
                    <div class="col-lg-8">
                        <div class="card">
                            <div class="card-header">
                                <h5>Content</h5>
                            </div>
                            <div class="card-body">
                                <div id="summernote"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column - Options -->
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header">
                                <h5>Post Options</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="postTitle" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="postTitle" value="Getting Started with React Hooks">
                                </div>

                                <div class="mb-3">
                                    <label for="postDescription" class="form-label">Description</label>
                                    <textarea class="form-control" id="postDescription" rows="3">Learn how to use React Hooks to manage state and side effects in your functional components.</textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="postSlug" class="form-label">Slug</label>
                                    <input type="text" class="form-control" id="postSlug" value="getting-started-react-hooks">
                                </div>

                                <div class="mb-3">
                                    <label for="publishedDate" class="form-label">Published Date</label>
                                    <input type="date" class="form-control" id="publishedDate" value="2024-01-15">
                                </div>

                                <div class="mb-3">
                                    <label for="postIcon" class="form-label">Icon</label>
                                    <div style="display: flex; gap: 8px;">
                                        <input type="text" class="form-control" id="postIcon" placeholder="fa-react" value="fa-react" style="flex: 1;">
                                        <span class="form-control" style="flex: 0 0 auto; display: flex; align-items: center; background: var(--surface-alt); border: 1px solid var(--line);"><i class="fab fa-react"></i></span>
                                    </div>
                                    <small class="text-muted">Font Awesome icon class</small>
                                </div>

                                <div class="mb-3">
                                    <label for="postImage" class="form-label">Image</label>
                                    <input type="file" class="form-control" id="postImage" accept="image/*">
                                    <small class="text-muted">Upload featured image</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer Buttons -->
                <div class="d-flex gap-2 justify-content-end mb-4" style="margin-top: 20px;">
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-bs5.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#summernote').summernote({
                placeholder: 'Start typing your post content here...',
                tabsize: 2,
                height: 300,
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'underline', 'clear']],
                    ['fontname', ['fontname']],
                    ['color', ['color']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['table', ['table']],
                    ['insert', ['link', 'picture', 'video']],
                    ['view', ['fullscreen', 'codeview', 'help']]
                ]
            });
        });
        
        window.addEventListener('click', function(event) {
            if (!event.target.matches('button')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    if (menu.style.display === 'block') menu.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
