<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Blog CMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container-fluid" style="display: flex; justify-content: space-between; align-items: center;">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-feather-alt"></i> Blog CMS
            </a>
            <div class="d-flex" style="align-items: center; gap: 20px;">
                <a href="index.html" class="nav-link">Dashboard</a>
                <div style="position: relative; display: inline-block;">
                    <a href="#" class="nav-link" style="cursor: pointer;" onclick="event.preventDefault(); document.getElementById('contentMenu').style.display = document.getElementById('contentMenu').style.display === 'block' ? 'none' : 'block';">Content <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 4px;"></i></a>
                    <div id="contentMenu" class="dropdown-menu" style="display: none; position: absolute; top: 100%; left: 0; min-width: 150px;">
                        <a href="#" class="dropdown-item">Posts</a>
                        <a href="#" class="dropdown-item">Pages</a>
                        <a href="#" class="dropdown-item">Projects</a>
                    </div>
                </div>
                <a href="settings.html" class="nav-link" style="color: #0a66c2;">Settings</a>
                <a href="#" class="nav-link">Users</a>
                <div style="position: relative; display: inline-block; margin-left: 20px;">
                    <button class="btn btn-outline-primary" style="font-size: 0.9rem; padding: 8px 14px;" onclick="document.getElementById('userMenu').style.display = document.getElementById('userMenu').style.display === 'block' ? 'none' : 'block';">
                        <i class="fas fa-user"></i> adrian-johnson <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 6px;"></i>
                    </button>
                    <div id="userMenu" class="dropdown-menu" style="display: none; position: absolute; top: 100%; right: 0; min-width: 150px;">
                        <a href="profile.html" class="dropdown-item"><i class="fas fa-user-circle"></i> Profile</a>
                        <div class="dropdown-divider"></div>
                        <a href="login.html" class="dropdown-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <div class="container-fluid">
            <h1>Settings</h1>

            <form>
                <div class="row">
                    <div class="col-lg-8">
                        <!-- General Settings -->
                        <div class="card">
                            <div class="card-header">
                                <h5>General Settings</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="blogTitle" class="form-label">Blog Title</label>
                                    <input type="text" class="form-control" id="blogTitle" value="Adrian's Tech Blog">
                                </div>
                                <div class="mb-3">
                                    <label for="blogDescription" class="form-label">Blog Description</label>
                                    <textarea class="form-control" id="blogDescription" rows="3">A blog about technology, web development, and programming best practices.</textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="blogUrl" class="form-label">Blog URL</label>
                                    <input type="url" class="form-control" id="blogUrl" value="https://example.com">
                                </div>
                                <div class="mb-3">
                                    <label for="postsPerPage" class="form-label">Posts Per Page</label>
                                    <input type="number" class="form-control" id="postsPerPage" value="10" min="1">
                                </div>
                            </div>
                        </div>

                        <!-- SEO Settings -->
                        <div class="card">
                            <div class="card-header">
                                <h5>SEO Settings</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="metaDescription" class="form-label">Meta Description</label>
                                    <textarea class="form-control" id="metaDescription" rows="2">A blog about technology, web development, and programming. Updated regularly with tips and tutorials.</textarea>
                                    <small class="text-muted">Recommended: 150-160 characters</small>
                                </div>
                                <div class="mb-3">
                                    <label for="metaKeywords" class="form-label">Meta Keywords</label>
                                    <input type="text" class="form-control" id="metaKeywords" value="technology, web development, programming, React, TypeScript">
                                    <small class="text-muted">Separate keywords with commas</small>
                                </div>
                                <div class="mb-3">
                                    <div style="display: flex; gap: 8px; align-items: center;">
                                        <input type="checkbox" id="allowComments" checked>
                                        <label for="allowComments" style="margin: 0; font-weight: 500;">Allow comments on new posts</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Email Settings -->
                        <div class="card">
                            <div class="card-header">
                                <h5>Email Settings</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="adminEmail" class="form-label">Admin Email</label>
                                    <input type="email" class="form-control" id="adminEmail" value="admin@example.com">
                                </div>
                                <div class="mb-3">
                                    <label for="smtpServer" class="form-label">SMTP Server</label>
                                    <input type="text" class="form-control" id="smtpServer" placeholder="smtp.gmail.com">
                                </div>
                                <div class="mb-3">
                                    <label for="smtpPort" class="form-label">SMTP Port</label>
                                    <input type="number" class="form-control" id="smtpPort" placeholder="587" value="587">
                                </div>
                                <div class="mb-3">
                                    <div style="display: flex; gap: 8px; align-items: center;">
                                        <input type="checkbox" id="useSSL" checked>
                                        <label for="useSSL" style="margin: 0; font-weight: 500;">Use SSL encryption</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header">
                                <h5>Quick Links</h5>
                            </div>
                            <div class="card-body" style="padding: 0;">
                                <div style="display: flex; flex-direction: column;">
                                    <a href="#" style="padding: 12px 20px; border-bottom: 1px solid var(--line); color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s;" onmouseover="this.style.background='var(--surface-alt)'" onmouseout="this.style.background='transparent'"><i class="fas fa-cog"></i> General</a>
                                    <a href="#" style="padding: 12px 20px; border-bottom: 1px solid var(--line); color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s;" onmouseover="this.style.background='var(--surface-alt)'" onmouseout="this.style.background='transparent'"><i class="fas fa-search"></i> SEO</a>
                                    <a href="#" style="padding: 12px 20px; border-bottom: 1px solid var(--line); color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s;" onmouseover="this.style.background='var(--surface-alt)'" onmouseout="this.style.background='transparent'"><i class="fas fa-envelope"></i> Email</a>
                                    <a href="#" style="padding: 12px 20px; border-bottom: 1px solid var(--line); color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s;" onmouseover="this.style.background='var(--surface-alt)'" onmouseout="this.style.background='transparent'"><i class="fas fa-palette"></i> Appearance</a>
                                    <a href="#" style="padding: 12px 20px; color: var(--ink); text-decoration: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s;" onmouseover="this.style.background='var(--surface-alt)'" onmouseout="this.style.background='transparent'"><i class="fas fa-plug"></i> Integrations</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer Buttons -->
                <div class="d-flex gap-2 justify-content-end mb-4" style="margin-top: 20px;">
                    <a href="index.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('click', function(event) {
            if (!event.target.matches('button')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    if (menu.style.display === 'block') menu.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
